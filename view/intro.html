<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Responsive Fullscreen Video</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: black;
    }
    video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* 화면 비율에 맞게 꽉 채움 */
    }
</style>
</head>
<body>

<video src="https://i.ifh.cc/On1W9Y.mp4" autoplay loop muted playsinline></video>

</body>
</html>
